services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: retail-namenode
    hostname: namenode
    ports:
      - "9871:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: retail-cluster
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
    networks:
      - retail-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: retail-datanode
    hostname: datanode
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: namenode:9870
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
    networks:
      - retail-net

  spark-master:
    image: apache/spark:3.5.0
    container_name: retail-spark-master
    hostname: spark-master
    user: root
    depends_on:
      - namenode
      - datanode
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ../data:/opt/spark/data
      - ../output:/opt/spark/output
      - ../spark:/opt/spark/work-dir/spark
      - ../src:/opt/spark/work-dir/src
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
    networks:
      - retail-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: retail-spark-worker
    hostname: spark-worker
    user: root
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: 8081
    volumes:
      - ../data:/opt/spark/data
      - ../output:/opt/spark/output
      - ../spark:/opt/spark/work-dir/spark
      - ../src:/opt/spark/work-dir/src
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    networks:
      - retail-net

volumes:
  namenode_data:
  datanode_data:

networks:
  retail-net:
    driver: bridge
